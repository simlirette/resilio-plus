<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resilio+ — Home / Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Space Grotesk", -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #f0eee9;
  }
  button { font-family: inherit; }
  *::-webkit-scrollbar { width: 0; height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>

<script type="text/babel">
const STATES = [
  { key: 'normal',   label: 'Normal — Readiness 78' },
  { key: 'ideal',    label: 'Journée idéale — Readiness 92' },
  { key: 'recovery', label: 'Récupération obligatoire — Readiness 45' },
];

function Frame({ state, dark }) {
  return (
    <div data-screen-label={`${dark ? 'Dark' : 'Light'} — ${state}`}>
      <IOSDevice width={390} height={844} dark={dark}>
        <DashboardScreen state={state} dark={dark} />
      </IOSDevice>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <div style={{ padding: '0 60px 40px', maxWidth: 'max-content' }}>
        <div style={{
          fontSize: 34, fontWeight: 600, color: 'rgba(40,30,20,0.88)',
          letterSpacing: -0.8, marginBottom: 6,
          fontFamily: '"Space Grotesk", sans-serif',
        }}>Resilio+ — Home / Dashboard</div>
        <div style={{
          fontSize: 14, color: 'rgba(60,50,40,0.6)',
          maxWidth: 720, lineHeight: 1.5,
          fontFamily: '"Space Grotesk", sans-serif',
        }}>
          iOS home screen. Space Grotesk, warm off-white / warm charcoal, single amber accent.
          Semantic green/yellow/red reserved strictly for physiological metrics
          (Readiness, Strain, Sleep score, Cognitive load). 3 states × 2 modes.
        </div>
      </div>

      <DCSection title="Light mode" subtitle="Fond off-white #F5F5F2, greys chauds, accent amber unique">
        {STATES.map(s => (
          <DCArtboard key={s.key} label={s.label} width={390} height={844}
            style={{ borderRadius: 48 }}>
            <Frame state={s.key} dark={false} />
          </DCArtboard>
        ))}
      </DCSection>

      <DCSection title="Dark mode" subtitle="Fond charbon chaud #161412 (non-clinique), même accent">
        {STATES.map(s => (
          <DCArtboard key={s.key} label={s.label} width={390} height={844}
            style={{ borderRadius: 48, background: '#000' }}>
            <Frame state={s.key} dark={true} />
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
