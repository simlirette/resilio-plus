services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resilio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resilio}
      POSTGRES_DB: ${POSTGRES_DB:-resilio_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resilio -d resilio_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./resilio:/app/resilio
      - ./.bmad-core:/app/.bmad-core
    environment:
      PYTHONPATH: /app/backend
      DATABASE_URL: postgresql+psycopg2://resilio:${POSTGRES_PASSWORD:-resilio}@db:5432/resilio_db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      HEVY_API_KEY: ${HEVY_API_KEY:-}
      TERRA_API_KEY: ${TERRA_API_KEY:-}
      TERRA_DEV_ID: ${TERRA_DEV_ID:-}
      FOOD_API_KEY: ${FOOD_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "4000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend

volumes:
  postgres_data:
