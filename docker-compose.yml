services:

  # ── PostgreSQL ────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: resilio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: resilio
      POSTGRES_PASSWORD: resilio
      POSTGRES_DB: resilio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resilio -d resilio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ───────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resilio_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://resilio:resilio@db:5432/resilio_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend Next.js ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    container_name: resilio_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
